name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Generate Windows icon
        run: python -c "from PIL import Image; img=Image.open('logo.png').convert('RGBA'); img.save('logo.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"

      - name: Build executable
        run: pyinstaller gtnh-sync.spec

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gtnh-sync.exe
          generate_release_notes: true
